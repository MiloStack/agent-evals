name: Agent Evals CI Example

on:
  push: {}
  pull_request: {}

jobs:
  evaluate-agent-output:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run agent-evals action
        uses: MiloStack/agent-evals@v0.1.0
        with:
          path: ./src
          domain: devops
          strict: true
